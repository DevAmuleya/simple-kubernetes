apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-kubernetes
  labels:
    app: simple-kubernetes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-kubernetes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: simple-kubernetes
    spec:
      containers:
        - name: simple-kubernetes
          image: dworkspace1/simple-kubernetes:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
