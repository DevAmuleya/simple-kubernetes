apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-kubernetes-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-kubernetes-app
  template:
    metadata:
      labels:
        app: simple-kubernetes-app
    spec:
      containers:
        - name: simple-kubernetes-container
          image: devamuleya/simple-kubernetes-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
