apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-kubernetes
  namespace: default
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: simple-kubernetes

  template:
    metadata:
      labels:
        app: simple-kubernetes

    spec:
      containers:
        - name: simple-kubernetes
          image: dworkspace1/simple-kubernetes:latest

          ports:
            - containerPort: 8000

          env:
            - name: APP_VERSION
              value: "production"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
